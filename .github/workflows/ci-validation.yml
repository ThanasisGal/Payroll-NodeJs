name: CI

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate two-phase deployment safety contract
        shell: bash
        run: |
          set -euo pipefail

          script="deploy-ubuntu.sh"
          bash -n "$script"

          if [[ ! -x "$script" ]]; then
            echo "ERROR: $script is not executable in the CI checkout"
            exit 1
          fi

          index_mode=$(git ls-files --stage -- "$script" | awk 'NR == 1 { print $1 }')
          tree_mode=$(git ls-tree HEAD -- "$script" | awk 'NR == 1 { print $1 }')

          if [[ "$index_mode" != "100755" ]]; then
            echo "ERROR: $script index mode is $index_mode, expected 100755"
            exit 1
          fi

          if [[ "$tree_mode" != "100755" ]]; then
            echo "ERROR: $script HEAD tree mode is $tree_mode, expected 100755"
            exit 1
          fi

          echo "Executable mode contract passed: $script tree=$tree_mode index=$index_mode filesystem=executable"

          workflow_file=".github/workflows/ci-validation.yml"
          executable_mode_contract=$(awk '
            /script="deploy-ubuntu\.sh"/ { capture=1 }
            /^[[:space:]]+require\(\) \{/ { if (capture) exit }
            capture
          ' "$workflow_file")

          for contract_pattern in \
            'if [[ ! -x "$script" ]]' \
            'git ls-files --stage -- "$script"' \
            'git ls-tree HEAD -- "$script"' \
            '"$index_mode" != "100755"' \
            '"$tree_mode" != "100755"' \
            'Executable mode contract passed'
          do
            if ! grep -Fq -- "$contract_pattern" <<< "$executable_mode_contract"; then
              echo "ERROR: missing executable-mode CI contract: $contract_pattern"
              exit 1
            fi
          done

          require() {
            local pattern="$1"
            if ! grep -Eq -- "$pattern" "$script"; then
              echo "ERROR: missing deployment safety contract: $pattern"
              exit 1
            fi
          }

          reject() {
            local pattern="$1"
            if grep -Eq -- "$pattern" "$script"; then
              echo "ERROR: forbidden deployment workflow command found: $pattern"
              exit 1
            fi
          }

          require '1\) Prepare release'
          require '2\) Deploy merged release'
          require '3\) Exit'
          require 'Invalid DEPLOY_ACTION'
          require 'immutable_git_preflight'
          require 'current_branch.*!=.*main'
          require 'git fetch origin main'
          require 'git status --porcelain'
          require 'main\.\.\.origin/main'
          require 'release/prod-\$\{NEW_VERSION\}'
          require 'git switch -c "\$RELEASE_BRANCH"'
          require 'verify_prepare_git_identity'
          require 'git config user\.name'
          require 'git config user\.email'
          require 'git add -- package.json'
          require 'git add -f -- build'
          require 'git add -f -- public/min\.js'
          require 'git diff --cached --name-only'
          require 'gh pr create .*--draft'
          require 'RELEASE PREPARED — NO PRODUCTION DEPLOYMENT PERFORMED'
          require 'DEPLOY MERGED RELEASE: Git mutation disabled'
          require 'git diff --exit-code -- build public/min\.js'
          require 'DEPLOY ABORTED — REBUILT ARTIFACTS DIFFER FROM MERGED RELEASE'
          require 'remote_apply_flags_disabled_guard'
          require 'remote_runtime_apply_disabled_guard'
          require 'APPLY_RUNTIME_DISABLED'
          require 'ALLOW_REPO_TRANSFER_APPLY'
          require 'ALLOW_PRODUCTION_REPO_TRANSFER_APPLY'
          require "exclude_file_has_exact_line '\.env'"
          require "exclude_file_has_exact_line '\.env\.production'"
          require 'pm2 reload payroll --update-env'
          require 'CONFIRM_PRODUCTION_DEPLOY.*!=.*yes'
          require 'Active users should complete/save their work before deployment\.'
          require 'git restore --source .* --worktree -- build public/min\.js'
          require 'git ls-files --others --exclude-standard -z -- build public/min\.js'
          require 'git ls-files --others --ignored --exclude-standard -z -- build public/min\.js'
          require 'rollback_failed_prepare'
          require 'git restore --source .* --staged --worktree -- package\.json build public/min\.js'
          require 'git switch main'
          require 'git branch -d "\$RELEASE_BRANCH"'
          require 'PREPARE_COMMIT_CREATED="true"'
          require "git diff --check -- \. ':\(exclude\)build/\*\*' ':\(exclude\)public/min\.js/\*\*'"
          require "git diff --cached --check -- \. ':\(exclude\)build/\*\*' ':\(exclude\)public/min\.js/\*\*'"
          require '--seed "\$APP_VERSION"'
          require 'DEPLOYMENT ABORTED — PRODUCTION CDN UPLOAD IS REQUIRED'
          require 'OBF_ENV.*==.*prod.*UPLOAD_TO_CDN.*!=.*true'
          require 'DEPLOY_ACTION.*==.*prepare'
          require 'check_command "gh"'

          reject 'git add -A'
          reject 'git add -f --? \.'
          reject 'git push( +[^ ]+)* +origin +main'
          reject 'git pull'
          reject 'git rebase'
          reject 'git merge'
          reject 'git reset --hard'
          reject 'git clean'
          reject 'git branch -D'
          reject '--seed.*(RANDOM|date|%Y|%s|PID|\$\$)'
          reject 'APP_VERSION=.*date'
          reject 'UPLOAD_TO_CDN="false"'
          reject 'AWS credentials not configured\. CDN operations will be skipped\.'
          reject 'Cannot access S3 bucket:.*CDN upload will be skipped'

          if DEPLOY_ACTION=invalid bash "$script" > /tmp/deploy-invalid-action.log 2>&1; then
            echo "ERROR: invalid DEPLOY_ACTION unexpectedly succeeded"
            exit 1
          fi
          grep -q 'Invalid DEPLOY_ACTION' /tmp/deploy-invalid-action.log
          grep -q 'DEPLOYMENT ABORTED BEFORE PRODUCTION CHANGES' /tmp/deploy-invalid-action.log
          if grep -Eq 'git fetch|Cleaning build directories|aws |ssh |rsync |pm2 ' /tmp/deploy-invalid-action.log; then
            echo "ERROR: invalid DEPLOY_ACTION reached Git/build/network operations"
            exit 1
          fi

          if [[ "$(grep -c 'remote_apply_flags_disabled_guard$' "$script")" -ne 1 ]]; then
            echo "ERROR: expected exactly one pre-build flag-only guard invocation"
            exit 1
          fi
          if [[ "$(grep -c 'remote_runtime_apply_disabled_guard$' "$script")" -ne 1 ]]; then
            echo "ERROR: expected exactly one post-rsync runtime-service guard invocation"
            exit 1
          fi
          if ! awk '{ sub(/\r$/, ""); if ($0 == ".env") found=1 } END { exit !found }' rsync-excludes.txt \
            || ! awk '{ sub(/\r$/, ""); if ($0 == ".env.production") found=1 } END { exit !found }' rsync-excludes.txt; then
            echo "ERROR: production env files are not both excluded from rsync"
            exit 1
          fi

          flag_guard_body=$(awk '/^remote_apply_flags_disabled_guard\(\)/ { capture=1 } /^remote_runtime_apply_disabled_guard\(\)/ { if (capture) exit } capture' "$script")
          runtime_guard_body=$(awk '/^remote_runtime_apply_disabled_guard\(\)/ { capture=1 } /^get_file_size\(\)/ { if (capture) exit } capture' "$script")
          if grep -q 'apasxoliseisWeeklyRepoTransferApplyRuntimeGuardService' <<< "$flag_guard_body"; then
            echo "ERROR: pre-build flag-only guard imports the new runtime service"
            exit 1
          fi
          if ! grep -q 'apasxoliseisWeeklyRepoTransferApplyRuntimeGuardService' <<< "$runtime_guard_body"; then
            echo "ERROR: post-rsync guard does not import the runtime service"
            exit 1
          fi

          flag_guard_line=$(grep -n 'remote_apply_flags_disabled_guard$' "$script" | cut -d: -f1)
          runtime_guard_line=$(grep -n 'remote_runtime_apply_disabled_guard$' "$script" | cut -d: -f1)
          gh_check_line=$(grep -n 'check_command "gh"' "$script" | cut -d: -f1)
          gh_guard_line=$(sed -n "$((gh_check_line - 1))p" "$script")
          if [[ "$gh_guard_line" != *'DEPLOY_ACTION" == "prepare"'* ]]; then
            echo "ERROR: gh prerequisite is not prepare-only"
            exit 1
          fi
          build_cleanup_line=$(grep -n 'BUILD_STARTED="true"' "$script" | cut -d: -f1)
          prepare_exit_line=$(grep -n 'RELEASE PREPARED — NO PRODUCTION DEPLOYMENT PERFORMED' "$script" | cut -d: -f1)
          first_s3_line=$(grep -m1 -n 'aws s3 sync' "$script" | cut -d: -f1)
          first_rsync_line=$(grep -n '^rsync -az' "$script" | cut -d: -f1)
          first_pm2_reload_line=$(grep -n 'pm2 reload payroll --update-env' "$script" | cut -d: -f1)
          if (( flag_guard_line >= build_cleanup_line )); then
            echo "ERROR: first runtime guard must run before local build cleanup"
            exit 1
          fi
          if (( runtime_guard_line <= first_rsync_line || runtime_guard_line >= first_pm2_reload_line )); then
            echo "ERROR: second runtime guard must run after rsync and before PM2 reload"
            exit 1
          fi
          if (( prepare_exit_line >= first_s3_line || prepare_exit_line >= first_rsync_line || prepare_exit_line >= first_pm2_reload_line )); then
            echo "ERROR: prepare mode must terminate before production operations"
            exit 1
          fi

      - name: Validate hardened CSS deployment safety contract
        shell: bash
        run: |
          set -euo pipefail

          script="deploy-css-linux.sh"
          test -f "$script"
          bash -n "$script"
          test -x "$script"

          index_mode=$(git ls-files --stage -- "$script" | awk 'NR == 1 { print $1 }')
          tree_mode=$(git ls-tree HEAD -- "$script" | awk 'NR == 1 { print $1 }')
          test "$index_mode" = "100755"
          test "$tree_mode" = "100755"

          require_css_contract() {
            local pattern="$1"
            if ! grep -Fq -- "$pattern" "$script"; then
              echo "ERROR: missing CSS deployment safety contract: $pattern"
              exit 1
            fi
          }

          reject_css_contract() {
            local pattern="$1"
            if grep -Eq -- "$pattern" "$script"; then
              echo "ERROR: forbidden CSS deployment operation found: $pattern"
              exit 1
            fi
          }

          require_css_contract '1) Verify merged CSS'
          require_css_contract '2) Deploy merged CSS'
          require_css_contract 'immutable_git_preflight'
          require_css_contract 'git status --porcelain'
          require_css_contract 'git fetch --prune origin main'
          require_css_contract 'main...origin/main'
          require_css_contract 'exact_head_main_ci_guard'
          require_css_contract '--event push'
          require_css_contract 'headSha =='
          require_css_contract '$INITIAL_HEAD'
          require_css_contract 'conclusion =='
          require_css_contract 'status =='
          require_css_contract '.name == "validate"'
          require_css_contract 'mktemp -d'
          require_css_contract 'first.min.css'
          require_css_contract 'second.min.css'
          require_css_contract 'cmp -s "$first_css" "$second_css"'
          require_css_contract './node_modules/.bin/cleancss'
          require_css_contract 'CSS BUILD IS NOT DETERMINISTIC'
          require_css_contract 'CSS_ALREADY_DEPLOYED'
          require_css_contract 'CSS_DEPLOYMENT_REQUIRED'
          require_css_contract 'CSS_REMOTE_OBJECT_MISSING'
          require_css_contract 'CONFIRM_PRODUCTION_CSS_DEPLOY'
          require_css_contract 'Type DEPLOY CSS PRODUCTION to continue:'
          require_css_contract 'assets/own/css/.staging/main.min.${INITIAL_HEAD}.${LOCAL_CSS_SHA}.css'
          require_css_contract 'Staging S3 CSS hash verification failed'
          require_css_contract 'Final S3 CSS hash verification failed'
          require_css_contract 'metadata-directive REPLACE'
          require_css_contract 'git-sha=$INITIAL_HEAD,app-version=$INITIAL_VERSION,css-sha256=$LOCAL_CSS_SHA'
          require_css_contract 'cloudfront wait invalidation-completed'
          require_css_contract '/$S3_FINAL_KEY*'
          require_css_contract 'CSS DEPLOYMENT VERIFICATION FAILED'
          require_css_contract 'immutable_git_postflight'

          reject_css_contract 'git[[:space:]]+(add|commit|push|pull|merge)'
          reject_css_contract 'npm[[:space:]]+version'
          reject_css_contract 'sed[[:space:]]+-i.*package\.json'
          reject_css_contract '(^|[[:space:]])ssh([[:space:]]|$)'
          reject_css_contract '(^|[[:space:]])rsync([[:space:]]|$)'
          reject_css_contract '(^|[[:space:]])pm2([[:space:]]|$)'
          reject_css_contract '(^|[[:space:]])systemctl([[:space:]]|$)'
          reject_css_contract 'StrictHostKeyChecking=no'
          reject_css_contract '18\.199\.'

          node - <<'NODE'
          const scripts = require('./package.json').scripts || {};
          if (scripts['css:minify'] !== 'cleancss --inline none -o public/css/main.min.css public/css/main.css') {
            throw new Error('css:minify changed unexpectedly');
          }
          if (scripts['css:verify'] !== './deploy-css-linux.sh verify') {
            throw new Error('css:verify does not use the hardened script');
          }
          if (scripts['css:deploy'] !== './deploy-css-linux.sh deploy') {
            throw new Error('css:deploy does not use the hardened script');
          }
          for (const [name, command] of Object.entries(scripts)) {
            if (/aws\s+s3|cloudfront\s+create-invalidation/.test(command)) {
              throw new Error(`direct AWS deployment npm script found: ${name}`);
            }
          }
          NODE

          echo "Hardened CSS deployment safety contract passed: tree=$tree_mode index=$index_mode filesystem=executable"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies without lifecycle scripts
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Syntax-check tracked JavaScript
        shell: bash
        run: |
          set -euo pipefail

          while IFS= read -r -d '' file; do
            case "$file" in
              public/min.js|public/min.js/*|*.min.js)
                echo "SKIP generated/minified JavaScript: $file"
                continue
                ;;
            esac

            if grep -Eq \
              '^[[:space:]]*(import|export)([[:space:]{*]|$)' \
              "$file"
            then
              echo "CHECK ESM $file"
              node --check --input-type=module < "$file"
            else
              echo "CHECK CommonJS/script $file"
              node --check "$file"
            fi
          done < <(git ls-files -z '*.js')

      - name: Validate CSP and frontend safety contracts
        shell: bash
        run: |
          set -euo pipefail

          node public/js/ergazomenoi/programmata/elegxosApasxolhseonPeriodoy.holidayBadge.test.js
          node public/js/ergazomenoi/programmata/elegxosApasxolhseonPeriodoy.atomicRepoTransferUi.test.js

          if grep -En 'on(click|change|submit)=' \
            public/js/ergazomenoi/programmata/elegxosApasxolhseonPeriodoy.js
          then
            echo "ERROR: inline event handler found in protected frontend source"
            exit 1
          fi

      - name: Validate no-apply and no-write safety contracts
        shell: bash
        run: |
          set -euo pipefail

          node server/services/ergazomenoi/apasxoliseisPolicyPreviewApplyDryRunService.test.js
          node server/services/ergazomenoi/apasxoliseisPolicyPreviewApplyExecutionService.test.js
          node server/services/ergazomenoi/apasxoliseisPolicyPreviewApplyModelWriterService.test.js
          node server/services/ergazomenoi/apasxoliseisPolicyPreviewApplyOrchestrationService.test.js
          node server/services/ergazomenoi/apasxoliseisPolicyPreviewApplyPlanService.test.js
          node server/services/ergazomenoi/apasxoliseisPolicyPreviewApplyProdhlomenaOrariaModelService.test.js
          node server/services/ergazomenoi/apasxoliseisPolicyPreviewApplyProdhlomenaOrariaOrchestrationService.test.js
          node server/services/ergazomenoi/apasxoliseisWeeklyRepoTransferApplySafetyContract.test.js

      - name: Validate linked repo-transfer decision feature when present
        shell: bash
        run: |
          set -euo pipefail

          feature_tests=(
            "server/services/ergazomenoi/apasxoliseisWeeklyRepoTransferDecisionSafetyContract.test.js"
            "server/services/ergazomenoi/apasxoliseisWeeklyRepoTransferDecisionBatchService.test.js"
            "server/services/ergazomenoi/apasxoliseisWeeklyRepoTransferAuthoritativeContextService.test.js"
            "server/services/ergazomenoi/apasxoliseisWeeklyRepoTransferDecisionLoader.test.js"
            "server/services/ergazomenoi/apasxoliseisWeeklyRepoTransferDecisionReconstructionService.test.js"
            "server/services/ergazomenoi/apasxoliseisWeeklyRepoTransferDecisionService.test.js"
            "server/services/ergazomenoi/apasxoliseisWeeklyRepoTransferApplyRuntimeGuardService.test.js"
            "server/services/ergazomenoi/apasxoliseisWeeklyRepoTransferApplyIndexGuardService.test.js"
            "server/middlewares/repoTransferApplyBodyParser.test.js"
            "server/controllers/ergazomenoi/erganhController.repoTransferApplyRuntime.test.js"
          )

          present=()
          missing=()

          for test_file in "${feature_tests[@]}"; do
            if [[ -f "$test_file" ]]; then
              present+=("$test_file")
            else
              missing+=("$test_file")
            fi
          done

          if (( ${#present[@]} == 0 )); then
            echo "SKIP linked repo-transfer decision suite: feature is not present on this branch."
            exit 0
          fi

          if (( ${#missing[@]} > 0 )); then
            echo "ERROR: linked repo-transfer decision suite is only partially present."
            printf 'Missing: %s\n' "${missing[@]}"
            exit 1
          fi

          for test_file in "${feature_tests[@]}"; do
            echo "RUN $test_file"
            node "$test_file"
          done

          decision_sources=(
            "server/services/ergazomenoi/apasxoliseisWeeklyRepoTransferDecisionService.js"
            "server/services/ergazomenoi/apasxoliseisWeeklyRepoTransferDecisionBatchService.js"
            "server/services/ergazomenoi/apasxoliseisWeeklyRepoTransferDecisionReconstructionService.js"
          )

          for source_file in "${decision_sources[@]}"; do
            if [[ ! -f "$source_file" ]]; then
              echo "ERROR: decision tests exist but production source was not found: $source_file"
              exit 1
            fi
          done

          if grep -En \
            'apasxoliseisPolicyPreviewApply' \
            "${decision_sources[@]}"
          then
            echo "ERROR: apply dependency found in decision services"
            exit 1
          fi

          if grep -En \
            '\.(updateOne|updateMany|findOneAndUpdate|bulkWrite|save)[[:space:]]*\(' \
            "${decision_sources[@]}"
          then
            echo "ERROR: write method found in decision read/reconstruction services"
            exit 1
          fi

      - name: Run safe focused tests
        shell: bash
        run: |
          set -euo pipefail

          tests=(
            "public/js/ergazomenoi/programmata/elegxosApasxolhseonPeriodoy.atomicRepoTransferUi.test.js"
            "public/js/ergazomenoi/programmata/elegxosApasxolhseonPeriodoy.holidayBadge.test.js"
            "public/js/symbaseis/ypologismoiKlimakion/ypologismos.test.js"
            "server/controllers/ergazomenoi/ergazomenoiController.workTermsSnapshot.test.js"
            "server/services/ergazomenoi/apasxoliseisPolicyPreviewApplyDryRunService.test.js"
            "server/services/ergazomenoi/apasxoliseisPolicyPreviewApplyExecutionService.test.js"
            "server/services/ergazomenoi/apasxoliseisPolicyPreviewApplyModelWriterService.test.js"
            "server/services/ergazomenoi/apasxoliseisPolicyPreviewApplyOrchestrationService.test.js"
            "server/services/ergazomenoi/apasxoliseisPolicyPreviewApplyPlanService.test.js"
            "server/services/ergazomenoi/apasxoliseisPolicyPreviewApplyProdhlomenaOrariaModelService.test.js"
            "server/services/ergazomenoi/apasxoliseisPolicyPreviewApplyProdhlomenaOrariaOrchestrationService.test.js"
            "server/services/ergazomenoi/apasxoliseisPolicyPreviewApprovalService.test.js"
            "server/services/ergazomenoi/apasxoliseisPolicyPreviewGroupingService.test.js"
            "server/services/ergazomenoi/apasxoliseisWeeklyRepoTransferAtomicPageProjectionService.test.js"
            "server/services/ergazomenoi/apasxoliseisWeeklyRepoTransferSinglePairGroupProjectionService.test.js"
            "server/services/ergazomenoi/apasxoliseisWeeklyRepoTransferSinglePairProposalService.test.js"
            "server/services/ergazomenoi/apasxoliseisWeeklyRepoTransferSinglePairService.test.js"
            "server/services/ergazomenoi/apasxoliseisWeeklyRepoTransferApplyCommandService.test.js"
            "server/services/ergazomenoi/apasxoliseisWeeklyRepoTransferApplyPreflightService.test.js"
            "server/services/ergazomenoi/apasxoliseisWeeklyRepoTransferAtomicWriterService.test.js"
            "server/services/ergazomenoi/apasxoliseisWeeklyRepoTransferApplyService.test.js"
            "server/services/ergazomenoi/apasxoliseisWeeklyRepoTransferApplySafetyContract.test.js"
            "server/services/ergazomenoi/apasxoliseisWeeklyRepoTransferApplyRuntimeGuardService.test.js"
            "server/services/ergazomenoi/apasxoliseisWeeklyRepoTransferApplyIndexGuardService.test.js"
            "server/middlewares/repoTransferApplyBodyParser.test.js"
            "server/controllers/ergazomenoi/erganhController.repoTransferApplyRuntime.test.js"
            "server/utils/ergazomenoi/getOrarioTermsForDate.test.js"
          )

          for test_file in "${tests[@]}"; do
            echo "RUN $test_file"
            node "$test_file"
          done

          echo "SKIP isolated localhost POST test:"
          echo "server/middlewares/repoTransferDecisionBodyParser.test.js"

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Verify repository cleanliness
        shell: bash
        run: |
          set -euo pipefail

          git diff --exit-code
          git diff --cached --exit-code

          if test -n "$(git status --porcelain)"; then
            echo "ERROR: workflow or tests modified the repository"
            git status --short
            exit 1
          fi

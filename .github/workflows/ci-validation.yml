name: CI

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate two-phase deployment safety contract
        shell: bash
        run: |
          set -euo pipefail

          script="deploy-ubuntu.sh"
          bash -n "$script"

          require() {
            local pattern="$1"
            if ! grep -Eq "$pattern" "$script"; then
              echo "ERROR: missing deployment safety contract: $pattern"
              exit 1
            fi
          }

          reject() {
            local pattern="$1"
            if grep -Eq "$pattern" "$script"; then
              echo "ERROR: forbidden deployment workflow command found: $pattern"
              exit 1
            fi
          }

          require '1\) Prepare release'
          require '2\) Deploy merged release'
          require '3\) Exit'
          require 'Invalid DEPLOY_ACTION'
          require 'immutable_git_preflight'
          require 'current_branch.*!=.*main'
          require 'git fetch origin main'
          require 'git status --porcelain'
          require 'main\.\.\.origin/main'
          require 'release/prod-\$\{NEW_VERSION\}'
          require 'git switch -c "\$RELEASE_BRANCH"'
          require 'git add -- package.json public/min\.js'
          require 'gh pr create .*--draft'
          require 'RELEASE PREPARED — NO PRODUCTION DEPLOYMENT PERFORMED'
          require 'DEPLOY MERGED RELEASE: Git mutation disabled'
          require 'git diff --exit-code -- public/min\.js'
          require 'DEPLOY ABORTED — REBUILT ARTIFACTS DIFFER FROM MERGED RELEASE'
          require 'remote_runtime_apply_disabled_guard'
          require 'APPLY_RUNTIME_DISABLED'
          require 'ALLOW_REPO_TRANSFER_APPLY'
          require 'ALLOW_PRODUCTION_REPO_TRANSFER_APPLY'
          require "grep -Fxq '\.env'"
          require "grep -Fxq '\.env\.production'"
          require 'pm2 reload payroll --update-env'
          require 'CONFIRM_PRODUCTION_DEPLOY.*!=.*yes'
          require 'Active users should complete/save their work before deployment\.'
          require 'git restore --source .* --worktree -- public/min\.js'
          require 'git ls-files --others --exclude-standard -z -- public/min\.js'
          require 'git ls-files --others --ignored --exclude-standard -z -- public/min\.js'
          require 'rm -rf "\$BUILD_DIR"'

          reject 'git add -A'
          reject 'git push( +[^ ]+)* +origin +main'
          reject 'git pull'
          reject 'git rebase'
          reject 'git merge'
          reject 'git reset --hard'
          reject 'git clean'

          if DEPLOY_ACTION=invalid bash "$script" > /tmp/deploy-invalid-action.log 2>&1; then
            echo "ERROR: invalid DEPLOY_ACTION unexpectedly succeeded"
            exit 1
          fi
          grep -q 'Invalid DEPLOY_ACTION' /tmp/deploy-invalid-action.log
          grep -q 'DEPLOYMENT ABORTED BEFORE PRODUCTION CHANGES' /tmp/deploy-invalid-action.log
          if grep -Eq 'git fetch|Cleaning build directories|aws |ssh |rsync |pm2 ' /tmp/deploy-invalid-action.log; then
            echo "ERROR: invalid DEPLOY_ACTION reached Git/build/network operations"
            exit 1
          fi

          test "$(grep -c 'remote_runtime_apply_disabled_guard$' "$script")" -eq 2
          grep -Fxq '.env' rsync-excludes.txt
          grep -Fxq '.env.production' rsync-excludes.txt

          mapfile -t runtime_guard_lines < <(grep -n 'remote_runtime_apply_disabled_guard$' "$script" | cut -d: -f1)
          build_cleanup_line=$(grep -n 'BUILD_STARTED="true"' "$script" | cut -d: -f1)
          prepare_exit_line=$(grep -n 'RELEASE PREPARED — NO PRODUCTION DEPLOYMENT PERFORMED' "$script" | cut -d: -f1)
          first_s3_line=$(grep -m1 -n 'aws s3 sync' "$script" | cut -d: -f1)
          first_rsync_line=$(grep -n '^rsync -az' "$script" | cut -d: -f1)
          first_pm2_reload_line=$(grep -n 'pm2 reload payroll --update-env' "$script" | cut -d: -f1)
          test "${runtime_guard_lines[0]}" -lt "$build_cleanup_line"
          test "${runtime_guard_lines[1]}" -gt "$first_rsync_line"
          test "${runtime_guard_lines[1]}" -lt "$first_pm2_reload_line"
          test "$prepare_exit_line" -lt "$first_s3_line"
          test "$prepare_exit_line" -lt "$first_rsync_line"
          test "$prepare_exit_line" -lt "$first_pm2_reload_line"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies without lifecycle scripts
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Syntax-check tracked JavaScript
        shell: bash
        run: |
          set -euo pipefail

          while IFS= read -r -d '' file; do
            case "$file" in
              public/min.js|public/min.js/*|*.min.js)
                echo "SKIP generated/minified JavaScript: $file"
                continue
                ;;
            esac

            if grep -Eq \
              '^[[:space:]]*(import|export)([[:space:]{*]|$)' \
              "$file"
            then
              echo "CHECK ESM $file"
              node --check --input-type=module < "$file"
            else
              echo "CHECK CommonJS/script $file"
              node --check "$file"
            fi
          done < <(git ls-files -z '*.js')

      - name: Validate CSP and frontend safety contracts
        shell: bash
        run: |
          set -euo pipefail

          node public/js/ergazomenoi/programmata/elegxosApasxolhseonPeriodoy.holidayBadge.test.js
          node public/js/ergazomenoi/programmata/elegxosApasxolhseonPeriodoy.atomicRepoTransferUi.test.js

          if grep -En 'on(click|change|submit)=' \
            public/js/ergazomenoi/programmata/elegxosApasxolhseonPeriodoy.js
          then
            echo "ERROR: inline event handler found in protected frontend source"
            exit 1
          fi

      - name: Validate no-apply and no-write safety contracts
        shell: bash
        run: |
          set -euo pipefail

          node server/services/ergazomenoi/apasxoliseisPolicyPreviewApplyDryRunService.test.js
          node server/services/ergazomenoi/apasxoliseisPolicyPreviewApplyExecutionService.test.js
          node server/services/ergazomenoi/apasxoliseisPolicyPreviewApplyModelWriterService.test.js
          node server/services/ergazomenoi/apasxoliseisPolicyPreviewApplyOrchestrationService.test.js
          node server/services/ergazomenoi/apasxoliseisPolicyPreviewApplyPlanService.test.js
          node server/services/ergazomenoi/apasxoliseisPolicyPreviewApplyProdhlomenaOrariaModelService.test.js
          node server/services/ergazomenoi/apasxoliseisPolicyPreviewApplyProdhlomenaOrariaOrchestrationService.test.js
          node server/services/ergazomenoi/apasxoliseisWeeklyRepoTransferApplySafetyContract.test.js

      - name: Validate linked repo-transfer decision feature when present
        shell: bash
        run: |
          set -euo pipefail

          feature_tests=(
            "server/services/ergazomenoi/apasxoliseisWeeklyRepoTransferDecisionSafetyContract.test.js"
            "server/services/ergazomenoi/apasxoliseisWeeklyRepoTransferDecisionBatchService.test.js"
            "server/services/ergazomenoi/apasxoliseisWeeklyRepoTransferAuthoritativeContextService.test.js"
            "server/services/ergazomenoi/apasxoliseisWeeklyRepoTransferDecisionLoader.test.js"
            "server/services/ergazomenoi/apasxoliseisWeeklyRepoTransferDecisionReconstructionService.test.js"
            "server/services/ergazomenoi/apasxoliseisWeeklyRepoTransferDecisionService.test.js"
            "server/services/ergazomenoi/apasxoliseisWeeklyRepoTransferApplyRuntimeGuardService.test.js"
            "server/services/ergazomenoi/apasxoliseisWeeklyRepoTransferApplyIndexGuardService.test.js"
            "server/middlewares/repoTransferApplyBodyParser.test.js"
            "server/controllers/ergazomenoi/erganhController.repoTransferApplyRuntime.test.js"
          )

          present=()
          missing=()

          for test_file in "${feature_tests[@]}"; do
            if [[ -f "$test_file" ]]; then
              present+=("$test_file")
            else
              missing+=("$test_file")
            fi
          done

          if (( ${#present[@]} == 0 )); then
            echo "SKIP linked repo-transfer decision suite: feature is not present on this branch."
            exit 0
          fi

          if (( ${#missing[@]} > 0 )); then
            echo "ERROR: linked repo-transfer decision suite is only partially present."
            printf 'Missing: %s\n' "${missing[@]}"
            exit 1
          fi

          for test_file in "${feature_tests[@]}"; do
            echo "RUN $test_file"
            node "$test_file"
          done

          decision_sources=(
            "server/services/ergazomenoi/apasxoliseisWeeklyRepoTransferDecisionService.js"
            "server/services/ergazomenoi/apasxoliseisWeeklyRepoTransferDecisionBatchService.js"
            "server/services/ergazomenoi/apasxoliseisWeeklyRepoTransferDecisionReconstructionService.js"
          )

          for source_file in "${decision_sources[@]}"; do
            if [[ ! -f "$source_file" ]]; then
              echo "ERROR: decision tests exist but production source was not found: $source_file"
              exit 1
            fi
          done

          if grep -En \
            'apasxoliseisPolicyPreviewApply' \
            "${decision_sources[@]}"
          then
            echo "ERROR: apply dependency found in decision services"
            exit 1
          fi

          if grep -En \
            '\.(updateOne|updateMany|findOneAndUpdate|bulkWrite|save)[[:space:]]*\(' \
            "${decision_sources[@]}"
          then
            echo "ERROR: write method found in decision read/reconstruction services"
            exit 1
          fi

      - name: Run safe focused tests
        shell: bash
        run: |
          set -euo pipefail

          tests=(
            "public/js/ergazomenoi/programmata/elegxosApasxolhseonPeriodoy.atomicRepoTransferUi.test.js"
            "public/js/ergazomenoi/programmata/elegxosApasxolhseonPeriodoy.holidayBadge.test.js"
            "public/js/symbaseis/ypologismoiKlimakion/ypologismos.test.js"
            "server/controllers/ergazomenoi/ergazomenoiController.workTermsSnapshot.test.js"
            "server/services/ergazomenoi/apasxoliseisPolicyPreviewApplyDryRunService.test.js"
            "server/services/ergazomenoi/apasxoliseisPolicyPreviewApplyExecutionService.test.js"
            "server/services/ergazomenoi/apasxoliseisPolicyPreviewApplyModelWriterService.test.js"
            "server/services/ergazomenoi/apasxoliseisPolicyPreviewApplyOrchestrationService.test.js"
            "server/services/ergazomenoi/apasxoliseisPolicyPreviewApplyPlanService.test.js"
            "server/services/ergazomenoi/apasxoliseisPolicyPreviewApplyProdhlomenaOrariaModelService.test.js"
            "server/services/ergazomenoi/apasxoliseisPolicyPreviewApplyProdhlomenaOrariaOrchestrationService.test.js"
            "server/services/ergazomenoi/apasxoliseisPolicyPreviewApprovalService.test.js"
            "server/services/ergazomenoi/apasxoliseisPolicyPreviewGroupingService.test.js"
            "server/services/ergazomenoi/apasxoliseisWeeklyRepoTransferAtomicPageProjectionService.test.js"
            "server/services/ergazomenoi/apasxoliseisWeeklyRepoTransferSinglePairGroupProjectionService.test.js"
            "server/services/ergazomenoi/apasxoliseisWeeklyRepoTransferSinglePairProposalService.test.js"
            "server/services/ergazomenoi/apasxoliseisWeeklyRepoTransferSinglePairService.test.js"
            "server/services/ergazomenoi/apasxoliseisWeeklyRepoTransferApplyCommandService.test.js"
            "server/services/ergazomenoi/apasxoliseisWeeklyRepoTransferApplyPreflightService.test.js"
            "server/services/ergazomenoi/apasxoliseisWeeklyRepoTransferAtomicWriterService.test.js"
            "server/services/ergazomenoi/apasxoliseisWeeklyRepoTransferApplyService.test.js"
            "server/services/ergazomenoi/apasxoliseisWeeklyRepoTransferApplySafetyContract.test.js"
            "server/services/ergazomenoi/apasxoliseisWeeklyRepoTransferApplyRuntimeGuardService.test.js"
            "server/services/ergazomenoi/apasxoliseisWeeklyRepoTransferApplyIndexGuardService.test.js"
            "server/middlewares/repoTransferApplyBodyParser.test.js"
            "server/controllers/ergazomenoi/erganhController.repoTransferApplyRuntime.test.js"
            "server/utils/ergazomenoi/getOrarioTermsForDate.test.js"
          )

          for test_file in "${tests[@]}"; do
            echo "RUN $test_file"
            node "$test_file"
          done

          echo "SKIP isolated localhost POST test:"
          echo "server/middlewares/repoTransferDecisionBodyParser.test.js"

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Verify repository cleanliness
        shell: bash
        run: |
          set -euo pipefail

          git diff --exit-code
          git diff --cached --exit-code

          if test -n "$(git status --porcelain)"; then
            echo "ERROR: workflow or tests modified the repository"
            git status --short
            exit 1
          fi
